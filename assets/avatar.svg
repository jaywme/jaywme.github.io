<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Cute white cat sitting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9a52"/>
      <stop offset="1" stop-color="#bf5700"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#efe9e2"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="128" cy="128" r="128"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <rect width="256" height="256" fill="url(#bg)"/>
    <circle cx="128" cy="126" r="98" fill="#ffffff" opacity="0.07"/>

    <!-- sitting body -->
    <path d="M78 252 C70 196 90 150 128 150 C166 150 186 196 178 252 Z" fill="url(#fur)"/>

    <!-- tail curling in front -->
    <path d="M176 226 C214 224 220 184 196 176 C210 192 198 210 168 212 Z" fill="#e9e2d9"/>

    <!-- front paws -->
    <ellipse cx="110" cy="246" rx="16" ry="12" fill="#ffffff"/>
    <ellipse cx="146" cy="246" rx="16" ry="12" fill="#ffffff"/>
    <path d="M110 240 v10 M146 240 v10" stroke="#e3dccf" stroke-width="2" stroke-linecap="round"/>

    <!-- ears -->
    <path d="M86 86 L92 38 L130 74 Z" fill="url(#fur)"/>
    <path d="M170 86 L164 38 L126 74 Z" fill="url(#fur)"/>
    <path d="M96 80 L100 52 L118 72 Z" fill="#f7b9c4"/>
    <path d="M160 80 L156 52 L138 72 Z" fill="#f7b9c4"/>

    <!-- head -->
    <ellipse cx="128" cy="96" rx="50" ry="46" fill="url(#fur)"/>

    <!-- blush -->
    <ellipse cx="96"  cy="108" rx="11" ry="7" fill="#ffc2cf" opacity="0.85"/>
    <ellipse cx="160" cy="108" rx="11" ry="7" fill="#ffc2cf" opacity="0.85"/>

    <!-- big cute eyes -->
    <ellipse cx="106" cy="92" rx="12" ry="15" fill="#3a2f2a"/>
    <ellipse cx="150" cy="92" rx="12" ry="15" fill="#3a2f2a"/>
    <circle cx="102" cy="86" r="4.6" fill="#ffffff"/>
    <circle cx="146" cy="86" r="4.6" fill="#ffffff"/>
    <circle cx="109" cy="97" r="2.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="153" cy="97" r="2.2" fill="#ffffff" opacity="0.9"/>

    <!-- nose + :3 mouth -->
    <path d="M122 110 L134 110 L128 117 Z" fill="#f28ea3"/>
    <path d="M128 117 v4 M128 121 q-7 7 -14 1 M128 121 q7 7 14 1"
          fill="none" stroke="#c98aa0" stroke-width="2.6" stroke-linecap="round"/>

    <!-- whiskers -->
    <g stroke="#e7ddd2" stroke-width="2.4" stroke-linecap="round">
      <path d="M92 110 L52 102"/>
      <path d="M92 118 L54 124"/>
      <path d="M164 110 L204 102"/>
      <path d="M164 118 L202 124"/>
    </g>
  </g>
</svg>
